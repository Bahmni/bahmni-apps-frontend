name: Publish Affected Packages

on:
  push:
    branches:
      - packages-workflows

jobs:
  detect-affected:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Nx handles:
      # - changed projects
      # - dependents
      # - dependency order
      # - uniqueness
      - id: affected
        name: Get Nx affected projects (in dependency order)
        run: |
          PROJECTS=$(yarn nx print-affected --base=origin/main --head=HEAD --select=projects --plain)
          echo "projects=$PROJECTS"
          echo "projects=$PROJECTS" >> $GITHUB_OUTPUT

      - id: build-matrix
        name: Convert projects into JSON matrix
        run: |
