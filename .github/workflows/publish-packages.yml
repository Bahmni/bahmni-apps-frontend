name: Publish Packages

on:
  push:
    branches: [packages-workflows]
    paths:
      - "packages/**"
  workflow_dispatch:

env:
  NODE_VERSION: "22"

# Detect affected + build matrix (ordered)
jobs:
  detect-affected:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - run: yarn install --frozen-lockfile

      - id: detect
        run: |
          # Get affected Nx projects
          RAW=$(npx nx show projects --affected --base=origin/main --type=lib || echo "")
          AFFECTED=$(echo "$RAW" | grep "^@bahmni/" | xargs)

          # If empty (manual dispatch), publish all
          if [ -z "$AFFECTED" ]; then
            AFFECTED="@bahmni/services @bahmni/design-system @bahmni/widgets"
          fi

          echo "affected=$AFFECTED" >> $GITHUB_OUTPUT
          echo "Affected: $AFFECTED"

      - id: matrix
        run: |
          AFFECTED="${{ steps.detect.outputs.affected }}"

          ORDER=(services design-system widgets)
          MATRIX="["

          for P in "${ORDER[@]}"; do
            if echo "$AFFECTED" | grep -q "$P"; then
              MATRIX="$MATRIX\"$P\","
            fi
          done

          MATRIX="${MATRIX%,}]"

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Publish matrix: $MATRIX"


# Matrix publish job
  publish:
    needs: detect-affected
    if: ${{ needs.detect-affected.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1   # enforce strict publish order
      matrix:
        package: ${{ fromJson(needs.detect-affected.outputs.matrix) }}

    environment: npm-publish

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          cache: "yarn"

      - run: yarn install --frozen-lockfile

      # Internal dependency version updates

      - name: Update internal dependency versions
        run: |
          PKG="${{ matrix.package }}"
          PKG_PATH="packages/bahmni-$PKG"

          echo "Updating internal dependencies for: $PKG"

          # Get previously published versions via artifacts
          download_version() {
            NAME="$1"
            if gh run download ${{ github.run_id }} -n version-$NAME --dir . 2>/dev/null; then
              cat version-$NAME/version
            else
              echo ""
            fi
          }

          SERVICES_VER=$(download_version "services")
          DESIGN_VER=$(download_version "design-system")

          cd "$PKG_PATH"

          # Update dependencies based on package
          if [ "$PKG" = "design-system" ] && [ -n "$SERVICES_VER" ]; then
            echo "Updating @bahmni/services → $SERVICES_VER"
            jq --arg ver "$SERVICES_VER" '.dependencies["@bahmni/services"] = $ver' package.json > package.json.tmp
            mv package.json.tmp package.json
          fi

          if [ "$PKG" = "widgets" ]; then
            if [ -n "$SERVICES_VER" ]; then
              echo "Updating @bahmni/services → $SERVICES_VER"
              jq --arg ver "$SERVICES_VER" '.dependencies["@bahmni/services"] = $ver' package.json > package.json.tmp
              mv package.json.tmp package.json
            fi
            if [ -n "$DESIGN_VER" ]; then
              echo "Updating @bahmni/design-system → $DESIGN_VER"
              jq --arg ver "$DESIGN_VER" '.dependencies["@bahmni/design-system"] = $ver' package.json > package.json.tmp
              mv package.json.tmp package.json
            fi
          fi

      # Lint, test, build, publish

      - name: Build & Publish
        id: publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          FULL_NAME="@bahmni/${{ matrix.package }}"
          PKG_PATH="packages/bahmni-${{ matrix.package }}"

          echo "Linting..."
          npx nx lint $FULL_NAME

          echo "Testing..."
          npx nx test $FULL_NAME

          echo "Building..."
          npx nx build $FULL_NAME

          cd "$PKG_PATH"
          BASE=$(node -p "require('./package.json').version")
          DEV="${BASE}-dev.${{ github.run_number }}"
          npm version "$DEV" --no-git-tag-version

          echo "$DEV" > version
          # npm publish --access public --tag dev

          echo "::notice title=Published::$FULL_NAME@$DEV"

      # Make version available to later matrix items
      - name: Upload version artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-${{ matrix.package }}
          path: packages/bahmni-${{ matrix.package }}/version
